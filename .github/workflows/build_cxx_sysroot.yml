name: Build C/C++ Sysroot

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]
  workflow_call:

permissions:
  contents: read
  checks: write

jobs:
  build_cxx_sysroot:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - variant: ""
          - variant: "-exnref-eh"
          - variant: "-exnref-ehpic"
          - variant: "-eh"
          - variant: "-ehpic"
    container:
      image: archlinux:base-devel
      options: --user root --workdir /
    steps:
      - name: Update and install dependencies
        run: |
          pacman -Syu --noconfirm
          # Removed llvm, clang, and lld from pacman to prevent conflicts with the pinned version
          pacman -Sy --noconfirm --needed coreutils nodejs npm wget git cmake ninja rsync make cargo python3 jq
          # curl https://get.wasmer.io -sSfL | sh -s "prerelease"

      - name: Install LLVM/Clang 21.1.8
        run: |
          # Download the correct Linux X64 release from your list
          wget https://github.com/llvm/llvm-project/releases/download/llvmorg-21.1.8/LLVM-21.1.8-Linux-X64.tar.xz
          
          # Create target directory and extract, stripping the top-level folder
          mkdir -p /opt/llvm-21.1.8
          tar -xf LLVM-21.1.8-Linux-X64.tar.xz -C /opt/llvm-21.1.8 --strip-components=1
          
          # Symlink standard 'ar' and 'nm' to the LLVM tools
          ln -s /opt/llvm-21.1.8/bin/llvm-ar /opt/llvm-21.1.8/bin/ar
          ln -s /opt/llvm-21.1.8/bin/llvm-nm /opt/llvm-21.1.8/bin/nm
          
          # Add the LLVM bin directory to the front of $GITHUB_PATH so all steps use it
          echo "/opt/llvm-21.1.8/bin" >> $GITHUB_PATH

      - name: Log tool versions
        run: |
          echo git
          git --version
          echo "##########################"
          echo clang
          clang -v
          echo "##########################"
          echo llvm-ar
          llvm-ar -V
          echo "##########################"
          echo llvm-nm
          llvm-nm -V
          echo "##########################"
          echo nm
          nm -V
          echo "##########################"
          echo nodejs
          node -v
          echo "##########################"
          echo npm
          npm -v

      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Build
        run: |
          git config --global --add safe.directory $(pwd)
          rm -rf /opt/wasix-sysroot
          mkdir -p /opt/wasix-sysroot
          ./build32${{ matrix.variant }}.sh
          cp -r sysroot32${{ matrix.variant }} /opt/wasix-sysroot/sysroot

      - name: Upload sysroot
        uses: actions/upload-artifact@v4
        with:
          name: wasix-sysroot${{ matrix.variant }}
          path: /opt/wasix-sysroot